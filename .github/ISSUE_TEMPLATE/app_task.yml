name: 应用任务 / 功能
description: 在编码前登记产品、UI、后端或应用开发任务。
title: "[任务]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        开始实现前先创建这个 Issue。这里是任务的中文共同事实来源，需要和项目看板保持同步。
  - type: input
    id: app-repo
    attributes:
      label: 应用 / 仓库
      description: 这个任务影响哪个应用或仓库？
      placeholder: "例如：xiaohonghua、liveeasy-ios、liveeasy-web"
    validations:
      required: true
  - type: input
    id: owner
    attributes:
      label: 负责人
      description: 谁负责推进这个任务？
      placeholder: "@username"
    validations:
      required: true
  - type: textarea
    id: goal
    attributes:
      label: 目标
      description: 这个修改要带来什么用户结果或业务结果？
      placeholder: "描述结果，不只描述代码改动。"
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: 范围
      description: 包含什么，明确不包含什么？
      placeholder: |
        包含：
        - 

        不包含：
        - 
    validations:
      required: true
  - type: textarea
    id: touched-files
    attributes:
      label: 可能涉及的文件 / 模块
      description: 列出预计会改动的文件、页面、模块、API 或配置区域。
      placeholder: |
        - src/features/login/*
        - app/routes/auth.ts
        - 构建配置
    validations:
      required: true
  - type: dropdown
    id: conflict-risk
    attributes:
      label: 冲突风险
      description: 这个任务和其他协作者工作重叠的概率有多高？
      options:
        - 低
        - 中
        - 高
    validations:
      required: true
  - type: checkboxes
    id: overlap-check
    attributes:
      label: 协作者 / AI Agent 冲突检查
      description: 编码前必须完成。
      options:
        - label: 我已检查本仓库项目看板或活跃任务列表。
          required: true
        - label: 如果任务属于更大的产品项目，我已检查关联的 Portfolio 条目。
          required: true
        - label: 我已检查相关 open Issues。
          required: true
        - label: 我已检查相关 open PRs。
          required: true
        - label: 我已检查最新远端分支状态，或已让 Agent 检查。
          required: true
        - label: 我已在重叠工作处留言协调，或确认没有重叠。
          required: true
  - type: textarea
    id: acceptance
    attributes:
      label: 验收标准
      description: 满足什么条件才算完成？
      placeholder: |
        - [ ] 
        - [ ] 
    validations:
      required: true
  - type: textarea
    id: test-plan
    attributes:
      label: 验证方式
      description: 这个修改应该如何验证？
      placeholder: |
        - 命令：
        - 手动流程：
        - 设备 / 浏览器：
    validations:
      required: true
  - type: textarea
    id: decisions
    attributes:
      label: 重要决策 / 备注
      description: 把长期有效的决策写在这里，不要只留在聊天里。
      placeholder: "决策、背景、备选方案和取舍。"
    validations:
      required: false
