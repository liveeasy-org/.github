name: 缺陷修复
description: 登记并协调缺陷修复，避免和协作者工作冲突。
title: "[缺陷]: "
labels: ["bug"]
body:
  - type: input
    id: app-repo
    attributes:
      label: 应用 / 仓库
      placeholder: "例如：xiaohonghua、liveeasy-ios、liveeasy-web"
    validations:
      required: true
  - type: textarea
    id: current
    attributes:
      label: 当前表现
      description: 现在发生了什么？
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 期望表现
      description: 正确情况下应该发生什么？
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: 复现步骤
      placeholder: |
        1. 
        2. 
        3. 
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: 证据
      description: 截图、日志、录屏、设备信息或链接。
    validations:
      required: false
  - type: textarea
    id: touched-files
    attributes:
      label: 可能涉及的文件 / 模块
      description: 列出预计会改动的文件、页面、模块、API 或配置区域。
    validations:
      required: true
  - type: dropdown
    id: conflict-risk
    attributes:
      label: 冲突风险
      options:
        - 低
        - 中
        - 高
    validations:
      required: true
  - type: checkboxes
    id: overlap-check
    attributes:
      label: 协作者 / AI Agent 冲突检查
      options:
        - label: 我已检查本仓库项目看板或活跃任务列表。
          required: true
        - label: 如果缺陷属于更大的产品项目，我已检查关联的 Portfolio 条目。
          required: true
        - label: 我已检查相关 open Issues。
          required: true
        - label: 我已检查相关 open PRs。
          required: true
        - label: 我已在重叠工作处留言协调，或确认没有重叠。
          required: true
  - type: textarea
    id: test-plan
    attributes:
      label: 修复验证方式
      placeholder: |
        - 命令：
        - 手动流程：
        - 设备 / 浏览器：
    validations:
      required: true
